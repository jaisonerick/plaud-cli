version: 2

builds:
  - binary: plaud
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/jaisonerick/plaud-cli/cmd.Version={{ .Version }}

archives:
  - id: binary
    format: binary
    name_template: "plaud-cli_{{ .Os }}_{{ .Arch }}"
  - id: tarball
    format: tar.gz
    name_template: "plaud-cli_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: jaisonerick
    name: plaud-cli
